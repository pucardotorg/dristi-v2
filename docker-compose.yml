# Local development services: PostgreSQL + MinIO (S3-compatible)
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pucar
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  # Auto-create the default bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 2;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/pucar-docs --ignore-existing;
        mc anonymous set download local/pucar-docs;
        echo 'Bucket pucar-docs ready';
      "

volumes:
  pgdata:
  miniodata:
